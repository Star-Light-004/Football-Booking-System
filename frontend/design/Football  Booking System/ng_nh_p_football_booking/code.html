<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#29a847",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<div class="relative min-h-screen w-full flex items-center justify-center p-4 sm:p-8">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-black/50 z-10"></div>
<div class="w-full h-full bg-cover bg-center" data-alt="Mờ ảo sân vận động bóng đá ban đêm rực rỡ ánh đèn" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA-5EF4Bd2I7vWZIIH-2I-WTmhPK7P8gTLyjJfUqI-3w3TfLnp4XBPT7LO204mG9c-6HV2XYCTdldRNlwjfvJv8VZsKYp4IY1o7Z_sE-j0CdGc-fvbmRuUsqv27jRRxri_Ld5Rw5rDhdQygYBKemYyIpaLILnm_HPd7D9vuI_HJoaaOkvrFoG7UMEmIVy8gJiNBV4YFkz_-oKwytmjruQaRjFqVlK4e_OkEbqbAP9k5CjBC_QZDdMKdyW2Qwto26FHqQCV71-TXujw');"></div>
</div>
<div class="relative z-20 w-full max-w-md bg-white/95 dark:bg-background-dark/95 backdrop-blur-md rounded-xl shadow-2xl overflow-hidden border border-white/20">
<div class="px-8 pt-8 pb-6 text-center">
<div class="inline-flex items-center justify-center p-3 mb-4 bg-primary/10 rounded-full">
<span class="material-symbols-outlined text-primary text-4xl">sports_soccer</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">Chào mừng trở lại!</h1>
<p class="mt-2 text-slate-600 dark:text-slate-400">Đăng nhập để đặt sân bóng ngay hôm nay</p>
</div>
<div class="px-8 pb-8">
<form action="#" class="space-y-5">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="identifier">
                            Email hoặc Số điện thoại
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" id="identifier" placeholder="name@example.com" type="text"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">
                                Mật khẩu
                            </label>
<a class="text-xs font-medium text-primary hover:underline transition-all" href="#">
                                Quên mật khẩu?
                            </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded cursor-pointer" id="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">
                            Ghi nhớ đăng nhập
                        </label>
</div>
<button class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2" type="submit">
                        Đăng nhập
                    </button>
</form>
<div class="mt-8 relative text-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<span class="relative px-4 bg-white dark:bg-background-dark text-xs font-medium text-slate-500 uppercase tracking-widest">Hoặc đăng nhập với</span>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-[#1877F2] hover:bg-[#166fe5] text-white rounded-lg transition-all shadow-sm">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="text-sm font-semibold">Facebook</span>
</button>
</div>
</div>
<div class="px-8 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Chưa có tài khoản? 
                    <a class="font-bold text-primary hover:underline" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
<div class="fixed bottom-6 right-6 hidden md:block">
<p class="text-white/60 text-xs flex items-center gap-1">
<span class="material-symbols-outlined text-sm">copyright</span> 2024 Football Booking System
            </p>
</div>
</div>
</body></html>
